name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: uc_nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci_user -d uc_nexus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/uc_nexus
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install poetry
      - run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Run tests
        run: poetry run pytest

      - name: Validate migrations
        run: poetry run alembic upgrade head

  migration-integrity:
    name: Migration Integrity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: uc_nexus_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci_user -d uc_nexus_migrations"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/uc_nexus_migrations
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install poetry
      - run: poetry install --no-interaction

      - name: Fresh upgrade
        run: poetry run alembic upgrade head

      - name: Downgrade to base
        run: poetry run alembic downgrade base

      - name: Re-upgrade (idempotency check)
        run: poetry run alembic upgrade head

      - name: Verify models match migrations
        run: poetry run alembic check
